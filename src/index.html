<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanTatil 2.0 - Roma Tatili Planı</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Shared core css -->
    <link rel="stylesheet" href="css/core.css">
    
    <style>
        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .main-header {
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.25rem;
            color: #fff;
            text-decoration: none;
        }
        
        .brand-icon {
            color: var(--primary);
            font-size: 1.5rem;
        }
        
        .app-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
            width: 100%;
        }
        
        @media (max-width: 1024px) {
            .app-layout {
                grid-template-columns: 1fr;
            }
        }
        
        .plan-column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            max-height: 80vh;
            padding-right: 0.5rem;
        }
        
        .plan-title-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .plan-meta {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        
        .timeline-wrapper {
            position: relative;
            padding-left: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        /* Vertical line for timeline */
        .timeline-wrapper::before {
            content: '';
            position: absolute;
            top: 10px;
            bottom: 10px;
            left: 7px;
            width: 2px;
            background: linear-gradient(180deg, var(--primary) 0%, rgba(139, 92, 246, 0.05) 100%);
            border-radius: 1px;
        }
        
        .timeline-node {
            position: relative;
        }
        
        /* Node bullet point */
        .timeline-node::after {
            content: '';
            position: absolute;
            left: -29px;
            top: 22px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 3px solid var(--primary);
            z-index: 5;
            box-shadow: 0 0 8px var(--primary);
            transition: var(--transition);
        }
        
        .timeline-node.completed::after {
            border-color: var(--secondary);
            box-shadow: 0 0 8px var(--secondary);
        }
        
        .creator-column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        /* Shared css styles inside index.html for component overrides if any */
        .creator-column .map-panel {
            padding: 1.25rem !important;
        }
        .creator-column .form-panel {
            padding: 1.25rem !important;
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header class="main-header">
        <div class="header-content">
            <a href="#" class="brand">
                <span class="brand-icon">▲</span> PlanTatil 2.0
            </a>
            
            <div style="display: flex; gap: 1rem; align-items: center;">
                <span class="pt-badge pt-badge-progress" id="live-share-badge">Canlı Paylaşım Aktif</span>
                
                <!-- Language Selector Dropdown -->
                <select id="lang-select" class="pt-select" style="width: auto; padding: 0.35rem 1.8rem 0.35rem 0.75rem; font-size: 0.8rem; height: auto; background-color: rgba(255,255,255,0.05); border-color: var(--border-color); color: var(--text-primary); cursor: pointer; border-radius: 6px;">
                    <option value="tr" selected>TR (Türkçe)</option>
                    <option value="en">EN (English)</option>
                </select>

                <!-- Theme Toggle Button -->
                <button id="theme-toggle-btn" class="pt-btn pt-btn-secondary" style="padding: 0.5rem; width: 34px; height: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1rem;" title="Tema Değiştir">
                    🌓
                </button>

                <a href="../dev_suite.html" class="pt-btn pt-btn-secondary" id="dev-suite-link" style="padding: 0.5rem 1rem;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                    Geliştirici Paneli (DevSuite)
                </a>
            </div>
        </div>
    </header>

    <div class="app-layout">
        <!-- Left: Plan timeline -->
        <div class="plan-column">
            <div class="plan-title-area">
                <div>
                    <h2 class="pt-section-title" id="plan-title" style="font-size: 1.75rem; margin: 0;">Roma Aile Tatili Planı</h2>
                    <div class="plan-meta">
                        <span class="pt-badge pt-badge-completed" id="duration-unit">3 Günlük Rota</span>
                        <span class="pt-badge pt-badge-progress" id="tempo-unit">Tempo: Dengeli</span>
                        <span class="pt-badge pt-badge-planned" id="child-unit">Çocuklu Aile Modu</span>
                    </div>
                </div>
                <div style="text-align: right;">
                    <span class="pt-label" id="total-duration-lbl" style="margin: 0;">Toplam Rota Süresi</span>
                    <strong style="font-family: var(--font-heading); font-size: 1.2rem; color: #fff;" id="total-duration-display">305 dk</strong>
                </div>
            </div>
            
            <div class="timeline-wrapper" id="plan-timeline-mount">
                <!-- Travel Card components will render here -->
            </div>
        </div>
        
        <!-- Right: Map card creator -->
        <div class="creator-column">
            <div id="map-creator-mount">
                <!-- MapCardCreator component mounts here -->
            </div>
        </div>
    </div>

    <!-- Import Reusable Component scripts -->
    <script src="js/locales.js"></script>
    <script src="components/travel-card.js"></script>
    <script src="components/map-card-creator.js"></script>
    
    <script>
        // Initial Plan Stops Mock Data
        const initialStops = [
            {
                id: 'stop_1',
                title: 'Panteon Tapınağı Ziyareti',
                type: 'place',
                time: '09:30',
                duration: 45,
                cost: '€5',
                location: 'Piazza della Rotonda, Roma',
                description: 'Antik Roma mimarisinin başyapıtı. Kubbedeki oculus deliğinden süzülen güneş ışığını izleyin.',
                rating: 4.8,
                votes: 4,
                completed: false,
                modes: ['budget', 'child-friendly']
            },
            {
                id: 'stop_2',
                title: 'Giolitti Gelateria Dondurma Keyfi',
                type: 'food',
                time: '11:00',
                duration: 30,
                cost: '€6.50',
                location: 'Via Uffici del Vicario 40, Roma',
                description: 'Yürüyüş sonrası serinlemek için İtalya\'nın en iyi gelato çeşitlerinden tadın. Fıstıklı dondurma tavsiye edilir.',
                rating: 4.7,
                votes: 9,
                completed: false,
                modes: ['gourmet', 'child-friendly']
            },
            {
                id: 'stop_3',
                title: 'Kolezyum Rehberli Turu',
                type: 'place',
                time: '13:00',
                duration: 110,
                cost: '€25',
                location: 'Piazza del Colosseo, Roma',
                description: 'Gladyatör giriş tüneli ve arena zeminine erişim dahil. Giriş saatinizden 15 dakika önce kapıda olun.',
                rating: 4.9,
                votes: 5,
                completed: false,
                modes: ['heavy']
            }
        ];

        const timelineMount = document.getElementById('plan-timeline-mount');
        const mapMount = document.getElementById('map-creator-mount');
        const durationDisplay = document.getElementById('total-duration-display');
        
        let loadedStops = [...initialStops];
        let cardInstances = [];
        let currentLang = 'tr';

        function calculateTotalDuration() {
            const total = loadedStops.reduce((sum, stop) => sum + stop.duration, 0);
            const unit = currentLang === 'tr' ? 'dk' : 'min';
            durationDisplay.textContent = `${total} ${unit}`;
        }

        function renderTimeline() {
            timelineMount.innerHTML = '';
            cardInstances = [];
            
            // Sort by time
            loadedStops.sort((a, b) => a.time.localeCompare(b.time));
            
            loadedStops.forEach(stop => {
                const nodeDiv = document.createElement('div');
                nodeDiv.className = `timeline-node ${stop.completed ? 'completed' : ''}`;
                
                const card = new TravelCard(stop, {
                    compact: false,
                    interactive: true,
                    lang: currentLang,
                    onStateChange: (updatedData) => {
                        const idx = loadedStops.findIndex(s => s.id === updatedData.id);
                        if (idx !== -1) {
                            loadedStops[idx] = updatedData;
                            nodeDiv.className = `timeline-node ${updatedData.completed ? 'completed' : ''}`;
                        }
                    }
                });
                
                card.render(nodeDiv);
                timelineMount.appendChild(nodeDiv);
                cardInstances.push(card);
            });
            
            calculateTotalDuration();
        }

        function updateStaticTexts() {
            const dictionary = PLAN_TATIL_LOCALES[currentLang];
            document.getElementById('live-share-badge').textContent = dictionary.live_share;
            document.getElementById('dev-suite-link').innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                ${dictionary.dev_panel}
            `;
            document.getElementById('total-duration-lbl').textContent = dictionary.total_duration;
            
            // Translate header blocks
            document.getElementById('plan-title').textContent = currentLang === 'tr' ? 'Roma Aile Tatili Planı' : 'Rome Family Trip Plan';
            document.getElementById('duration-unit').textContent = currentLang === 'tr' ? '3 Günlük Rota' : '3-Day Route';
            document.getElementById('tempo-unit').textContent = currentLang === 'tr' ? 'Tempo: Dengeli' : 'Pace: Balanced';
            document.getElementById('child-unit').textContent = currentLang === 'tr' ? 'Çocuklu Aile Modu' : 'Child Friendly Mode';
        }

        // Initialize Map Card Creator Component
        const mapCreator = new MapCardCreator({
            lang: currentLang,
            onCardCreated: (newCardData) => {
                loadedStops.push(newCardData);
                renderTimeline();
                
                // Alert confirmation style animation
                const dictionary = PLAN_TATIL_LOCALES[currentLang];
                const alertBanner = document.createElement('div');
                alertBanner.className = 'pt-badge pt-badge-completed animate-fade-in';
                alertBanner.style.position = 'fixed';
                alertBanner.style.bottom = '2rem';
                alertBanner.style.right = '2rem';
                alertBanner.style.zIndex = '1000';
                alertBanner.style.boxShadow = 'var(--shadow-lg)';
                alertBanner.style.padding = '0.75rem 1.5rem';
                
                const alertText = currentLang === 'tr' 
                    ? `✔ "${newCardData.title}" rota zaman çizelgesine eklendi!` 
                    : `✔ "${newCardData.title}" added to trip timeline!`;
                alertBanner.innerHTML = alertText;
                
                document.body.appendChild(alertBanner);
                
                setTimeout(() => {
                    alertBanner.remove();
                }, 3000);
            }
        });
        
        // Language selector change listener
        const langSelect = document.getElementById('lang-select');
        langSelect.addEventListener('change', (e) => {
            currentLang = e.target.value;
            
            // Update static titles
            updateStaticTexts();
            
            // Update Map Creator and re-render
            mapCreator.options.lang = currentLang;
            mapMount.innerHTML = '';
            mapCreator.render(mapMount);
            
            // Re-render timeline with new language
            renderTimeline();
        });

        // Theme initialization & Toggle
        const savedTheme = localStorage.getItem('plantatil_theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
        }

        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        themeToggleBtn.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('plantatil_theme', isLight ? 'light' : 'dark');
            if (mapCreator && typeof mapCreator.updateMapTheme === 'function') {
                mapCreator.updateMapTheme();
            }
        });

        // Render initial view
        updateStaticTexts();
        renderTimeline();
        mapCreator.render(mapMount);
    </script>
</body>
</html>
